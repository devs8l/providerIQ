version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: provideriq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: provideriq
      POSTGRES_USER: provideriq
      POSTGRES_PASSWORD: provideriq
    ports:
      - '5432:5432'
    volumes:
      - provideriq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U provideriq']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: provideriq-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - provideriq_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: provideriq-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  provideriq_pgdata:
  provideriq_redisdata:
